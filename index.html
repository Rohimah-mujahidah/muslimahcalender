        // Mendaftarkan Service Worker secara komprehensif agar syarat PWA (Installable) maksimal terpenuhi di Android/Chrome
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => { e.waitUntil(self.skipWaiting()); });
                    self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); });
                    self.addEventListener('fetch', (e) => { /* Bypass agar diakui offline-capable PWA oleh browser */ });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .then(() => console.log('PWA Service Worker Ready'))
                    .catch(() => console.warn('PWA Service Worker Registration Failed'));
            });
        }
    </script>

            return { day: parseInt(partsDay.find(p => p.type === 'day').value, 10), monthStr: monthStrValue, monthNum: monthNum, year: partsYear.find(p => p.type === 'year').value };
        };

        const getIslamicEvents = (date, hijri, lang) => {
            const events = []; const dayOfWeek = date.getDay(); const hDay = hijri.day; const hMonth = hijri.monthNum;
            
            // Cek Bulan Haram
            const isBulanHaram = [1, 7, 11, 12].includes(hMonth);
            if (isBulanHaram) events.push({ type: 'bulan_haram', ...eventDict.bulanHaram[lang] });

            // Cek Jumat Mustajab
            if (dayOfWeek === 5) events.push({ type: 'jumat_mustajab', ...eventDict.jumatMustajab[lang] });

            // Cek Itikaf / 10 Malam Terakhir
            if (hMonth === 9 && hDay >= 21) events.push({ type: 'itikaf', ...eventDict.itikaf[lang] });

            const isIdulFitri = (hDay === 1 && hMonth === 10);
            const isIdulAdha = (hDay === 10 && hMonth === 12);
            const isTasyriq = ((hDay === 11 || hDay === 12 || hDay === 13) && hMonth === 12);

            if (isIdulFitri) events.push({ type: 'hari_besar', ...eventDict.idulFitri[lang] });
            if (isIdulAdha) events.push({ type: 'hari_besar', ...eventDict.idulAdha[lang] });
            if (isTasyriq) events.push({ type: 'hari_besar', ...eventDict.tasyriq[lang] });
            if (hMonth === 9) events.push({ type: 'puasa_wajib', ...eventDict.ramadan[lang] });

            if (hDay === 1 && hMonth === 1) events.push({ type: 'hari_besar', ...eventDict.tahunBaru[lang] });
            if (hDay === 12 && hMonth === 3) events.push({ type: 'hari_besar', ...eventDict.maulid[lang] });
            if (hDay === 27 && hMonth === 7) events.push({ type: 'hari_besar', ...eventDict.isra[lang] });

            if (!isIdulFitri && !isIdulAdha && !isTasyriq && hMonth !== 9) {
                if (dayOfWeek === 1) events.push({ type: 'puasa_sunnah', ...eventDict.puasaSenin[lang] });
                else if (dayOfWeek === 4) events.push({ type: 'puasa_sunnah', ...eventDict.puasaKamis[lang] });
                if (hDay === 13 || hDay === 14 || hDay === 15) events.push({ type: 'puasa_sunnah', ...eventDict.ayyamulBidh[lang] });
                if (hDay === 9 && hMonth === 1) events.push({ type: 'puasa_sunnah', ...eventDict.tasua[lang] });
                if (hDay === 10 && hMonth === 1) events.push({ type: 'puasa_sunnah', ...eventDict.asyura[lang] });
                if (hDay === 15 && hMonth === 8) events.push({ type: 'puasa_sunnah', ...eventDict.nisfuSyakban[lang] });
                if (hDay === 9 && hMonth === 12) events.push({ type: 'puasa_sunnah', ...eventDict.arafah[lang] });
            }
            return events;
        };

        const getQuranSegments = (target, lang, mode) => {
            if (mode === 'tahfizh') {
                const val = String(target).replace('t_', '');
                const totalPages = 604;
                const p = lang === 'ar' ? 'صفحة' : 'Halaman';
                const topHalf = lang === 'ar' ? 'أعلى' : 'Atas';
                const bottomHalf = lang === 'ar' ? 'أسفل' : 'Bawah';
                const segments = [];
                
                if (val === '0.5') {
                    for(let i=1; i<=totalPages; i++) {
                        segments.push(`${p} ${formatNumber(i, lang)} (${topHalf})`);
                        segments.push(`${p} ${formatNumber(i, lang)} (${bottomHalf})`);
                    }
                } else {
                    const step = parseInt(val) || 1;
                    for(let i=1; i<=totalPages; i+=step) {
                        let end = i + step - 1;
                        if (end > totalPages) end = totalPages;
                        if (i === end) segments.push(`${p} ${formatNumber(i, lang)}`);
                        else segments.push(`${p} ${formatNumber(i, lang)} - ${formatNumber(end, lang)}`);
                    }
                }
                return segments;
            } else {
                const j = lang === 'ar' ? 'الجزء' : 'Juz';
                const h = lang === 'ar' ? 'الحزب' : 'Hizb';
                const m = lang === 'ar' ? 'المنزل' : 'Manzil';
                switch(parseInt(target)) {
                    case 6: return Array.from({length: 6}, (_, i) => `${j} ${formatNumber(i*5 + 1, lang)} - ${formatNumber(i*5 + 5, lang)}`);
                    case 7: return [ `${m} ${formatNumber(1, lang)} (الفاتحة - النساء)`, `${m} ${formatNumber(2, lang)} (المائدة - التوبة)`, `${m} ${formatNumber(3, lang)} (يونس - النحل)`, `${m} ${formatNumber(4, lang)} (الإسراء - الفرقان)`, `${m} ${formatNumber(5, lang)} (الشعراء - يس)`, `${m} ${formatNumber(6, lang)} (الصافات - الحجرات)`, `${m} ${formatNumber(7, lang)} (ق - الناس)` ];
                    case 10: return Array.from({length: 10}, (_, i) => `${j} ${formatNumber(i*3 + 1, lang)} - ${formatNumber(i*3 + 3, lang)}`);
                    case 30: return Array.from({length: 30}, (_, i) => `${j} ${formatNumber(i + 1, lang)}`);
                    case 60: return Array.from({length: 60}, (_, i) => `${h} ${formatNumber(i + 1, lang)}`);
                    default: return [];
                }
            }
        };

        const getHealthEvents = (date, enabled, hphtStr, cycle, duration, isPregnant, lang) => {
            if (!enabled || !hphtStr) return [];
            const events = []; const t = translations[lang];
            const hpht = new Date(`${hphtStr}T00:00:00`);
            const current = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const diffTime = Date.UTC(current.getFullYear(), current.getMonth(), current.getDate()) - Date.UTC(hpht.getFullYear(), hpht.getMonth(), hpht.getDate());
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            if (isPregnant) {
                if (diffDays === 280) events.push({ id: `hpl`, type: 'health_hpl', title: t.hplTitle, start: '00:00', end: '23:59', desc: t.hplDesc, dalil: t.hplDalil, keutamaan: t.hplKeutamaan });
                else if (diffDays > 0 && diffDays < 280 && diffDays % 7 === 0) events.push({ id: `preg`, type: 'health_preg', title: `${t.pregWeekTitle}${formatNumber(diffDays/7, lang)})`, start: '00:00', end: '23:59', desc: t.pregWeekDesc });
            } else {
                if (diffDays >= 0) {
                    const cycleDay = diffDays % cycle;
                    if (cycleDay < duration) events.push({ id: `haid`, type: 'health_haid', title: `${t.haidTitle}${formatNumber(cycleDay + 1, lang)})`, start: '00:00', end: '23:59', desc: t.haidDesc, dalil: t.haidDalil, keutamaan: t.haidKeutamaan });
                    else if (cycleDay === duration) events.push({ id: `suci`, type: 'health_suci', title: t.suciTitle, start: '00:00', end: '23:59', desc: t.suciDesc, dalil: t.suciDalil, keutamaan: t.suciKeutamaan });
                }
            }
            return events;
        };

        const formatDateKey = (date) => `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
        const formatExportDate = (dateStr, timeStr) => new Date(`${dateStr}T${timeStr}:00`).toISOString().replace(/-|:|\.\d\d\d/g, "");

        const getRoutineEvents = (date, kajianList, kuliahList) => {
            const events = [];
            const dTime = date.getTime();
            const dayOfWeek = date.getDay();
            const dateOfMonth = date.getDate();
            const dateKey = formatDateKey(date);

            kajianList.forEach(k => {
                const sDate = k.startDate ? new Date(`${k.startDate}T00:00:00`).getTime() : 0;
                const eDate = k.endDate ? new Date(`${k.endDate}T23:59:59`).getTime() : Infinity;
                if (dTime >= sDate && dTime <= eDate) {
                    if (k.recurrence === 'weekly' && parseInt(k.dayOfWeek) === dayOfWeek) events.push({...k, type: 'routine_kajian', dateKey});
                    else if (k.recurrence === 'monthly' && parseInt(k.dateOfMonth) === dateOfMonth) events.push({...k, type: 'routine_kajian', dateKey});
                    else if (k.recurrence === 'none' && k.startDate === dateKey) events.push({...k, type: 'routine_kajian', dateKey});
                }
            });

            kuliahList.forEach(k => {
                const sDate = k.startDate ? new Date(`${k.startDate}T00:00:00`).getTime() : 0;
                const eDate = k.endDate ? new Date(`${k.endDate}T23:59:59`).getTime() : Infinity;
                if (dTime >= sDate && dTime <= eDate && parseInt(k.dayOfWeek) === dayOfWeek) {
                    const sessionData = k.sessions?.[dateKey] || {};
                    events.push({...k, ...sessionData, title: k.subject, type: 'routine_kuliah', dateKey, originalId: k.id});
                }
            });

            return events.sort((a, b) => a.start.localeCompare(b.start));
        };

        const App = () => {
            const [isDayTime, setIsDayTime] = useState(() => safeGetItem('cal_theme', true));
            const [language, setLanguage] = useState(() => safeGetItem('cal_lang', 'id'));
            const [hijriOffset, setHijriOffset] = useState(() => safeGetItem('cal_hijri_offset', 0));
            const [userName, setUserName] = useState(() => safeGetItem('cal_user_name', 'Fulan'));
            
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isRoutineOpen, setIsRoutineOpen] = useState(false);

            const [healthEnabled, setHealthEnabled] = useState(() => safeGetItem('cal_health_enabled', false));
            const [hpht, setHpht] = useState(() => safeGetItem('cal_health_hpht', ''));
            const [cycle, setCycle] = useState(() => safeGetItem('cal_health_cycle', 28));
            const [haidDuration, setHaidDuration] = useState(() => safeGetItem('cal_health_duration', 7));
            const [isPregnant, setIsPregnant] = useState(() => safeGetItem('cal_health_pregnant', false));

            const [quranEnabled, setQuranEnabled] = useState(() => safeGetItem('cal_quran_enabled', false));
            const [quranMode, setQuranMode] = useState(() => safeGetItem('cal_quran_mode', 'tilawah'));
            const [quranTarget, setQuranTarget] = useState(() => safeGetItem('cal_quran_target', '30'));
            const [quranStartDate, setQuranStartDate] = useState(() => safeGetItem('cal_quran_start', formatDateKey(new Date())));
            const [quranHistory, setQuranHistory] = useState(() => safeGetItem('cal_quran_history', {}));

            const [kajianSchedules, setKajianSchedules] = useState(() => safeGetItem('cal_kajian', []));
            const [kuliahSchedules, setKuliahSchedules] = useState(() => safeGetItem('cal_kuliah', []));

            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [events, setEvents] = useState(() => safeGetItem('cal_events', {}));
            
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [newEvent, setNewEvent] = useState({ title: '', start: '08:00', end: '09:00', desc: '' });

            const [routineTab, setRoutineTab] = useState('kajian');
            const [newKajian, setNewKajian] = useState({ title: '', speaker: '', start: '18:00', end: '19:30', recurrence: 'weekly', dayOfWeek: 0, dateOfMonth: 1, startDate: formatDateKey(new Date()), endDate: '' });
            const [newKuliah, setNewKuliah] = useState({ subject: '', lecturer: '', start: '08:00', end: '09:40', dayOfWeek: 1, startDate: formatDateKey(new Date()), endDate: '' });

            const [editSessionObj, setEditSessionObj] = useState(null);

            const theme = {
                bg: isDayTime ? 'bg-fuchsia-50/50' : 'bg-[#1a1128]',
                text: isDayTime ? 'text-slate-800' : 'text-fuchsia-50',
                textMuted: isDayTime ? 'text-slate-500' : 'text-fuchsia-300/70',
                panel: isDayTime ? 'bg-white/80 border-fuchsia-200 shadow-[0_8px_30px_rgb(140,82,255,0.06)]' : 'bg-[#2d1b4e]/60 border-[#8c52ff]/20 shadow-[0_8px_30px_rgb(0,0,0,0.5)]',
                inputBg: isDayTime ? 'bg-fuchsia-50 border-fuchsia-200 focus:border-primary text-slate-800' : 'bg-[#1a1128]/80 border-[#8c52ff]/30 focus:border-secondary text-white',
                card: isDayTime ? 'bg-white border-fuchsia-100' : 'bg-[#2d1b4e]/40 border-[#8c52ff]/20',
                hoverCard: isDayTime ? 'hover:bg-fuchsia-50' : 'hover:bg-[#2d1b4e]/80',
                border: isDayTime ? 'border-fuchsia-200' : 'border-[#8c52ff]/30',
            };

            const tString = translations[language];

            const quranData = useMemo(() => {
                if (!quranEnabled || !quranStartDate) return { schedule: {}, projectedKhatam: null, completedCount: 0, targetTotal: 0 };
                const segments = getQuranSegments(quranTarget, language, quranMode);
                const targetTotal = segments.length;
                let schedule = {}; let cSeg = 0; let curr = new Date(`${quranStartDate}T00:00:00`); let completedCount = 0;
                const today = new Date(); today.setHours(0,0,0,0);
                let loops = 0;
                
                const hphtDate = hpht ? new Date(`${hpht}T00:00:00`) : null;

                while (cSeg < targetTotal && loops < 3000) {
                    const dateStr = formatDateKey(curr);
                    
                    let isHaidDay = false;
                    if (healthEnabled && !isPregnant && hphtDate) {
                        const diffTime = Date.UTC(curr.getFullYear(), curr.getMonth(), curr.getDate()) - Date.UTC(hphtDate.getFullYear(), hphtDate.getMonth(), hphtDate.getDate());
                        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                        if (diffDays >= 0) {
                            const cycleDay = diffDays % cycle;
                            if (cycleDay < haidDuration) isHaidDay = true;
                        }
                    }

                    if (isHaidDay) {
                        schedule[dateStr] = { isHaidPause: true };
                        curr.setDate(curr.getDate() + 1); loops++;
                        continue; 
                    }

                    const isDone = !!quranHistory[dateStr];
                    schedule[dateStr] = { segmentIndex: cSeg, segmentName: segments[cSeg], isDone: isDone, isMissed: !isDone && curr < today };
                    if (isDone) { completedCount++; cSeg++; } else if (curr >= today) { cSeg++; }
                    curr.setDate(curr.getDate() + 1); loops++;
                }
                const projectedKhatam = new Date(curr); projectedKhatam.setDate(projectedKhatam.getDate() - 1); 
                return { schedule, projectedKhatam, completedCount, targetTotal, segments };
            }, [quranEnabled, quranStartDate, quranTarget, quranHistory, language, quranMode, healthEnabled, hpht, cycle, haidDuration, isPregnant]);

            const generateCalendarGridData = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate(); const daysInPrevMonth = new Date(year, month, 0).getDate();
                let grid = [];
                const addGridItem = (d, isCurrent) => {
                    const hijri = getHijriDateDetails(d, hijriOffset, language);
                    grid.push({ 
                        date: d, day: d.getDate(), isCurrentMonth: isCurrent, hijri, 
                        islamicEvents: getIslamicEvents(d, hijri, language), 
                        healthEvents: getHealthEvents(d, healthEnabled, hpht, cycle, haidDuration, isPregnant, language),
                        routineEvents: getRoutineEvents(d, kajianSchedules, kuliahSchedules)
                    });
                };
                for (let i = 0; i < firstDay; i++) addGridItem(new Date(year, month - 1, daysInPrevMonth - firstDay + i + 1), false);
                for (let i = 1; i <= daysInMonth; i++) addGridItem(new Date(year, month, i), true);
                for (let i = 1; i <= 42 - grid.length; i++) addGridItem(new Date(year, month + 1, i), false);
                return grid;
            };

            const grid = useMemo(generateCalendarGridData, [currentDate, hijriOffset, language, healthEnabled, hpht, cycle, haidDuration, isPregnant, kajianSchedules, kuliahSchedules]);

            const toggleTheme = () => { setIsDayTime(!isDayTime); safeSetItem('cal_theme', !isDayTime); };
            const handleSaveSettings = (e) => {
                const t = e.target;
                if (t.name === 'userName') { setUserName(t.value); safeSetItem('cal_user_name', t.value); } 
                else if (t.name === 'hijriOffset') { const v = parseInt(t.value); setHijriOffset(v); safeSetItem('cal_hijri_offset', v); } 
                else if (t.name === 'healthEnabled') { setHealthEnabled(t.checked); safeSetItem('cal_health_enabled', t.checked); } 
                else if (t.name === 'hpht') { setHpht(t.value); safeSetItem('cal_health_hpht', t.value); } 
                else if (t.name === 'cycle') { const v = parseInt(t.value) || 0; setCycle(v); safeSetItem('cal_health_cycle', v); } 
                else if (t.name === 'haidDuration') { const v = parseInt(t.value) || 0; setHaidDuration(v); safeSetItem('cal_health_duration', v); } 
                else if (t.name === 'isPregnant') { setIsPregnant(t.checked); safeSetItem('cal_health_pregnant', t.checked); }
                else if (t.name === 'quranEnabled') { setQuranEnabled(t.checked); safeSetItem('cal_quran_enabled', t.checked); }
                else if (t.name === 'quranMode') { 
                    setQuranMode(t.value); safeSetItem('cal_quran_mode', t.value); 
                    const defaultT = t.value === 'tilawah' ? '30' : 't_1';
                    setQuranTarget(defaultT); safeSetItem('cal_quran_target', defaultT);
                }
                else if (t.name === 'quranTarget') { setQuranTarget(t.value); safeSetItem('cal_quran_target', t.value); }
                else if (t.name === 'quranStartDate') { setQuranStartDate(t.value); safeSetItem('cal_quran_start', t.value); }
            };

            const handleStepper = (name, currentVal, increment) => {
                const newVal = Math.max(0, currentVal + increment);
                handleSaveSettings({ target: { name, value: newVal, type: 'number' } });
            };

            const handleAddKajian = (e) => {
                e.preventDefault(); if(!newKajian.title) return;
                const updated = [...kajianSchedules, { id: Date.now().toString(), ...newKajian }];
                setKajianSchedules(updated); safeSetItem('cal_kajian', updated);
                setNewKajian({ ...newKajian, title: '', speaker: ''});
            };

            const handleAddKuliah = (e) => {
                e.preventDefault(); if(!newKuliah.subject) return;
                const updated = [...kuliahSchedules, { id: Date.now().toString(), ...newKuliah, sessions: {} }];
                setKuliahSchedules(updated); safeSetItem('cal_kuliah', updated);
                setNewKuliah({ ...newKuliah, subject: '', lecturer: ''});
            };

            const saveSessionEdit = (e) => {
                e.preventDefault();
                const updated = kuliahSchedules.map(k => {
                    if (k.id === editSessionObj.id) {
                        return { ...k, sessions: { ...k.sessions, [editSessionObj.dateKey]: { topic: editSessionObj.topic, link: editSessionObj.link, task: editSessionObj.task } } };
                    }
                    return k;
                });
                setKuliahSchedules(updated); safeSetItem('cal_kuliah', updated);
                setEditSessionObj(null);
            };

            const toggleQuranTask = (dateKey) => {
                const newHist = { ...quranHistory };
                if (newHist[dateKey]) delete newHist[dateKey]; else newHist[dateKey] = true;
                setQuranHistory(newHist); safeSetItem('cal_quran_history', newHist);
            };

            const handleAddEvent = (e) => {
                e.preventDefault(); if (!newEvent.title.trim()) return;
                const dKey = formatDateKey(selectedDate);
                const updated = { ...events, [dKey]: [...(events[dKey] || []), { id: Date.now().toString(), ...newEvent }].sort((a, b) => a.start.localeCompare(b.start)) };
                setEvents(updated); safeSetItem('cal_events', updated);
                setNewEvent({ title: '', start: '08:00', end: '09:00', desc: '' }); setIsFormOpen(false);
            };

            const handleDeleteEvent = (dKey, id) => {
                const dayEvts = events[dKey].filter(e => e.id !== id);
                const updated = { ...events, [dKey]: dayEvts };
                if (dayEvts.length === 0) delete updated[dKey];
                setEvents(updated); safeSetItem('cal_events', updated);
            };

            const exportToGoogle = (event, isFullDay = false) => {
                const dateKey = event.dateKey || formatDateKey(selectedDate);
                const startStr = formatExportDate(dateKey, event.start || "00:00");
                const endStr = formatExportDate(dateKey, event.end || "23:59");
                let url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&dates=${startStr}/${endStr}&details=${encodeURIComponent(event.desc || event.topic || '')}`;
                if(event.dalil) url += encodeURIComponent(`\n\n${tString.dalilLabel}: ${event.dalil}\n${tString.keutamaanLabel}: ${event.keutamaan}`);
                if(event.link) url += encodeURIComponent(`\n\nLink: ${event.link}`);
                if(event.task) url += encodeURIComponent(`\n\nTugas: ${event.task}`);
                window.open(url, '_blank');
            };

            const exportToApple = (event, isFullDay = false) => {
                const dateKey = event.dateKey || formatDateKey(selectedDate);
                const startStr = formatExportDate(dateKey, event.start || "00:00");
                const endStr = formatExportDate(dateKey, event.end || "23:59");
                let desc = event.desc ? event.desc.replace(/\n/g, '\\n') : (event.topic ? event.topic.replace(/\n/g, '\\n') : '');
                if(event.dalil) desc += `\\n\\n${tString.dalilLabel}: ${event.dalil}\\n${tString.keutamaanLabel}: ${event.keutamaan}`;
                if(event.link) desc += `\\n\\nLink: ${event.link}`;
                if(event.task) desc += `\\n\\nTugas: ${event.task}`;
                const icsContent = [
                    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Jadwal Premium//ID", "BEGIN:VEVENT",
                    `UID:${event.id || Date.now()}@jadwalpremium`, `DTSTAMP:${startStr}`, `DTSTART:${startStr}`, `DTEND:${endStr}`,
                    `SUMMARY:${event.title}`, `DESCRIPTION:${desc}`, "END:VEVENT", "END:VCALENDAR"
                ].join("\n");
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `${event.title.replace(/\s+/g, '_')}.ics`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const getTargetLabel = (target, mode) => {
                if (mode === 'tilawah') {
                    return tString[`target${target}`];
                } else {
                    if (target === 't_0.5') return tString.targetHalfPage;
                    if (target === 't_1') return tString.target1Page;
                    if (target === 't_2') return tString.target2Pages;
                    if (target === 't_3') return tString.target3Pages;
                    return target;
                }
            };

            const selectedDateKey = formatDateKey(selectedDate);
            const currentDayEvents = events[selectedDateKey] || [];
            const selectedHijriInfo = getHijriDateDetails(selectedDate, hijriOffset, language);
            const selectedIslamicEvents = getIslamicEvents(selectedDate, selectedHijriInfo, language);
            const selectedHealthEvents = getHealthEvents(selectedDate, healthEnabled, hpht, cycle, haidDuration, isPregnant, language);
            const selectedRoutineEvents = getRoutineEvents(selectedDate, kajianSchedules, kuliahSchedules);
            const selectedQuranTask = quranData.schedule[selectedDateKey];
            const currentHijriInfo = getHijriDateDetails(currentDate, hijriOffset, language);

            const getEventColor = (type) => type === 'hari_besar' ? 'bg-rose-50 border-rose-300 text-rose-800' : type === 'puasa_sunnah' ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : type === 'puasa_wajib' ? 'bg-amber-50 border-amber-300 text-amber-800' : type === 'health_haid' ? 'bg-pink-50 border-pink-300 text-pink-800' : type === 'health_suci' ? 'bg-sky-50 border-sky-300 text-sky-800' : type === 'health_hpl' || type === 'health_preg' ? 'bg-fuchsia-50 border-fuchsia-300 text-fuchsia-800' : type === 'routine_kajian' ? 'bg-orange-50 border-orange-300 text-orange-800' : type === 'routine_kuliah' ? 'bg-teal-50 border-teal-300 text-teal-800' : type === 'bulan_haram' ? 'bg-purple-50 border-purple-300 text-purple-800' : type === 'jumat_mustajab' ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : type === 'itikaf' ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : theme.card;
            const getDarkEventColor = (type) => type === 'hari_besar' ? 'bg-rose-900/30 border-rose-500/50 text-rose-200' : type === 'puasa_sunnah' ? 'bg-emerald-900/30 border-emerald-500/50 text-emerald-200' : type === 'puasa_wajib' ? 'bg-amber-900/30 border-amber-500/50 text-amber-200' : type === 'health_haid' ? 'bg-pink-900/30 border-pink-500/50 text-pink-200' : type === 'health_suci' ? 'bg-sky-900/30 border-sky-500/50 text-sky-200' : type === 'health_hpl' || type === 'health_preg' ? 'bg-fuchsia-900/30 border-fuchsia-500/50 text-fuchsia-200' : type === 'routine_kajian' ? 'bg-orange-900/30 border-orange-500/50 text-orange-200' : type === 'routine_kuliah' ? 'bg-teal-900/30 border-teal-500/50 text-teal-200' : type === 'bulan_haram' ? 'bg-purple-900/30 border-purple-500/50 text-purple-200' : type === 'jumat_mustajab' ? 'bg-emerald-900/30 border-emerald-500/50 text-emerald-200' : type === 'itikaf' ? 'bg-indigo-900/30 border-indigo-500/50 text-indigo-200' : theme.card;
            const getRibbonColor = (type) => type === 'hari_besar' ? 'bg-rose-500' : type === 'puasa_sunnah' ? 'bg-emerald-500' : type === 'puasa_wajib' ? 'bg-amber-500' : type === 'health_haid' ? 'bg-pink-500' : type === 'health_suci' ? 'bg-sky-500' : type === 'health_hpl' || type === 'health_preg' ? 'bg-fuchsia-500' : type === 'routine_kajian' ? 'bg-orange-500' : type === 'routine_kuliah' ? 'bg-teal-500' : type === 'bulan_haram' ? 'bg-purple-500' : type === 'jumat_mustajab' ? 'bg-emerald-500' : type === 'itikaf' ? 'bg-indigo-500' : 'bg-gradient-feminine';
            const getIconForType = (type) => type === 'hari_besar' ? <IconAlertTriangle className="w-5 h-5 text-rose-500" /> : type === 'puasa_wajib' ? <IconStar className="w-5 h-5 text-amber-500" /> : type === 'puasa_sunnah' ? <IconMoon className="w-5 h-5 text-emerald-500" /> : type === 'health_haid' ? <IconHeart className="w-5 h-5 text-pink-500" /> : type === 'health_suci' ? <IconSun className="w-5 h-5 text-sky-500" /> : type === 'health_hpl' || type === 'health_preg' ? <IconBaby className="w-5 h-5 text-fuchsia-500" /> : type === 'routine_kajian' ? <IconMic className="w-5 h-5 text-orange-500" /> : type === 'routine_kuliah' ? <IconBriefcase className="w-5 h-5 text-teal-500" /> : type === 'bulan_haram' ? <IconStar className="w-5 h-5 text-purple-500" /> : type === 'jumat_mustajab' ? <IconAward className="w-5 h-5 text-emerald-500" /> : type === 'itikaf' ? <IconMoon className="w-5 h-5 text-indigo-500" /> : <IconClock className="w-5 h-5 text-primary" />;

            return (
                <div dir={language === 'ar' ? 'rtl' : 'ltr'} className={`min-h-screen transition-colors duration-1000 ${theme.bg} ${theme.text} ${language === 'ar' ? 'font-arabic' : 'font-sans'} pb-20 overflow-x-hidden`}>
                    <div className="relative pt-8 md:pt-12 pb-6 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
                        
                        {/* TOP BUTTONS */}
                        <div className={`absolute top-4 ${language === 'ar' ? 'left-4 md:left-8' : 'right-4 md:right-8'} z-20 flex gap-2`}>
                            <button onClick={() => setIsRoutineOpen(true)} className={`p-3 rounded-full backdrop-blur-md transition-all shadow-lg hover:scale-105 ${isDayTime ? 'bg-white/90 text-primary hover:bg-fuchsia-100' : 'bg-[#2d1b4e]/80 text-secondary hover:bg-[#2d1b4e]'}`}>
                                <IconBriefcase className="w-5 h-5" />
                            </button>
                            <button onClick={() => setIsSettingsOpen(true)} className={`p-3 rounded-full backdrop-blur-md transition-all shadow-lg hover:scale-105 ${isDayTime ? 'bg-white/90 text-primary hover:bg-fuchsia-100' : 'bg-[#2d1b4e]/80 text-secondary hover:bg-[#2d1b4e]'}`}>
                                <IconSettings className="w-5 h-5" />
                            </button>
                            <button onClick={toggleTheme} className={`p-3 rounded-full backdrop-blur-md transition-all shadow-lg hover:scale-105 ${isDayTime ? 'bg-white/90 text-primary hover:bg-fuchsia-100' : 'bg-[#2d1b4e]/80 text-secondary hover:bg-[#2d1b4e]'}`}>
                                {isDayTime ? <IconMoon className="w-5 h-5" /> : <IconSun className="w-5 h-5" />}
                            </button>
                        </div>

                        <div className="text-center mb-8 md:mb-10 mt-6 md:mt-0">
                            {userName && <p className={`font-semibold mb-1 text-sm md:text-base ${isDayTime ? 'text-primary' : 'text-secondary'}`}>{tString.greeting}, {userName} ✨</p>}
                            <h1 className="text-3xl sm:text-4xl md:text-5xl font-bold text-gradient mb-3">{tString.title}</h1>
                            <p className={`font-semibold text-sm md:text-base ${theme.textMuted}`}>{tString.subtitle}</p>
                        </div>

                        <div className="grid lg:grid-cols-3 gap-6 md:gap-8">
                            {/* LEFT PANEL: CALENDAR */}
                            <div className={`lg:col-span-2 ${theme.panel} backdrop-blur-md rounded-3xl p-3 sm:p-5 md:p-8 border relative overflow-hidden`}>
                                <div className="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
                                <div className="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary/10 rounded-full blur-3xl pointer-events-none"></div>

                                <div className="relative z-10">
                                    <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                                        <div className="text-center sm:text-start">
                                            <h2 className="text-xl sm:text-2xl md:text-3xl font-bold font-mono tracking-tight text-gradient" dir="ltr">
                                                {currentDate.toLocaleString(language === 'ar' ? 'ar-SA' : 'id-ID', { month: 'long' })} {formatNumber(currentDate.getFullYear(), language)} {language === 'ar' ? 'م' : 'M'}
                                            </h2>
                                            <p className={`text-sm md:text-base font-medium mt-1 ${theme.textMuted}`}>{currentHijriInfo.monthStr} {formatNumber(currentHijriInfo.year, language)} {language === 'ar' ? 'هـ' : 'H'}</p>
                                        </div>
                                        <div className={`flex items-center gap-2 sm:gap-3 ${language === 'ar' ? 'flex-row-reverse' : ''}`}>
                                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className={`p-2 rounded-full ${theme.card} ${theme.hoverCard} border transition-all hover:scale-105`}><IconChevronLeft className="w-4 h-4 sm:w-5 sm:h-5" /></button>
                                            <button onClick={() => {const t = new Date(); setCurrentDate(t); setSelectedDate(t);}} className="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-wider bg-gradient-feminine text-white shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5">{tString.today}</button>
                                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className={`p-2 rounded-full ${theme.card} ${theme.hoverCard} border transition-all hover:scale-105`}><IconChevronRight className="w-4 h-4 sm:w-5 sm:h-5" /></button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3 mb-2 text-center">
                                        {tString.days.map((day, idx) => <div key={day} className={`text-[10px] sm:text-xs md:text-sm font-bold uppercase ${idx === 0 || idx === 6 ? 'text-rose-400' : theme.textMuted}`}>{day}</div>)}
                                    </div>

                                    <div className="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3">
                                        {grid.map((item, idx) => {
                                            const isSelected = formatDateKey(item.date) === selectedDateKey;
                                            const isToday = formatDateKey(item.date) === formatDateKey(new Date());
                                            const quranTaskObj = quranData.schedule[formatDateKey(item.date)];
                                            
                                            const hasQuran = quranTaskObj !== undefined && !quranTaskObj.isHaidPause;
                                            
                                            const hasHaid = item.healthEvents.some(e => e.type === 'health_haid');
                                            const hasHpl = item.healthEvents.some(e => e.type === 'health_hpl');
                                            const hasKajian = item.routineEvents.some(e => e.type === 'routine_kajian');
                                            const hasKuliah = item.routineEvents.some(e => e.type === 'routine_kuliah');

                                            return (
                                                <div key={idx} onClick={() => setSelectedDate(item.date)}
                                                    className={`
                                                        relative cursor-pointer rounded-lg md:rounded-2xl p-1.5 md:p-3 min-h-[55px] sm:min-h-[70px] md:min-h-[85px] flex flex-col justify-between border transition-all duration-300 transform overflow-hidden
                                                        ${!item.isCurrentMonth ? 'opacity-40 grayscale' : ''}
                                                        ${isSelected ? 'bg-gradient-feminine text-white shadow-[0_4px_15px_rgb(140,82,255,0.4)] scale-105 z-10 border-transparent' : `${theme.card} ${theme.hoverCard} ${theme.border} hover:-translate-y-1`}
                                                        ${hasHaid && !isSelected && isDayTime ? 'bg-pink-50 border-pink-200' : ''}
                                                        ${hasHaid && !isSelected && !isDayTime ? 'bg-pink-900/20 border-pink-500/30' : ''}
                                                        ${hasHpl && !isSelected && isDayTime ? 'bg-fuchsia-100 border-fuchsia-300' : ''}
                                                        ${hasHpl && !isSelected && !isDayTime ? 'bg-fuchsia-900/40 border-fuchsia-500/50' : ''}
                                                    `}
                                                >
                                                    <div className="flex justify-between items-start w-full relative" dir="ltr">
                                                        <span className={`text-[9px] sm:text-[10px] md:text-xs font-bold leading-none mt-0.5 ${isSelected ? 'text-fuchsia-100' : 'text-primary opacity-80'}`}>{formatNumber(item.hijri.day, language)}</span>
                                                        <span className={`text-xs sm:text-sm md:text-lg font-bold font-mono leading-none ${isSelected ? 'text-white' : (isToday ? 'text-primary' : theme.text)}`}>{formatNumber(item.day, language)}</span>
                                                    </div>
                                                    
                                                    <div className="mt-auto pt-1 w-full flex flex-wrap justify-center gap-0.5 md:gap-1">
                                                        {item.islamicEvents.map((ev, i) => {
                                                            if (ev.type === 'bulan_haram' || ev.type === 'jumat_mustajab') return null; // Sembunyikan dot agar kalender tidak terlalu penuh (hanya muncul di list agenda)
                                                            return <div key={`isl-${i}`} className={`w-1 h-1 sm:w-1.5 sm:h-1.5 md:w-2 md:h-2 rounded-full ${ev.type === 'hari_besar' ? 'bg-rose-500' : (ev.type === 'puasa_wajib' ? 'bg-amber-400' : (ev.type === 'itikaf' ? 'bg-indigo-400' : 'bg-emerald-400'))}`}></div>
                                                        })}
                                                        {item.healthEvents.map((ev, i) => <div key={`hlth-${i}`} className={`w-1 h-1 sm:w-1.5 sm:h-1.5 md:w-2 md:h-2 rounded-full ${ev.type === 'health_haid' ? 'bg-pink-500' : ev.type === 'health_suci' ? 'bg-sky-400' : 'bg-fuchsia-500'}`}></div>)}
                                                        {hasKajian && <div className={`w-1 h-1 sm:w-1.5 sm:h-1.5 md:w-2 md:h-2 rounded-full bg-orange-500`}></div>}
                                                        {hasKuliah && <div className={`w-1 h-1 sm:w-1.5 sm:h-1.5 md:w-2 md:h-2 rounded-full bg-teal-500`}></div>}
                                                        {hasQuran && <div className={`w-1 h-1 sm:w-1.5 sm:h-1.5 md:w-2 md:h-2 rounded-full ${isSelected ? 'bg-indigo-200' : 'bg-indigo-500'}`}></div>}
                                                        {events[formatDateKey(item.date)]?.length > 0 && <div className={`w-1 h-1 sm:w-1.5 sm:h-1.5 md:w-2 md:h-2 rounded-full ${isSelected ? 'bg-white' : 'bg-primary'} animate-pulse`}></div>}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT PANEL: JADWAL HARIAN */}
                            <div className={`lg:col-span-1 ${theme.panel} backdrop-blur-md rounded-3xl p-5 md:p-6 border flex flex-col h-full max-h-[800px]`}>
                                <div className="mb-6 border-b border-fuchsia-500/20 pb-4 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-xl font-bold text-gradient">{tString.dailyAgenda}</h3>
                                        <p className={`text-sm mt-1 font-medium ${theme.textMuted}`} dir="ltr">{language === 'ar' ? formatNumber(selectedDate.toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }), 'ar') : selectedDate.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} {language === 'ar' ? 'م' : 'M'}</p>
                                        <p className={`text-[10px] uppercase font-bold tracking-widest mt-0.5 text-primary`} dir="ltr">{formatNumber(selectedHijriInfo.day, language)} {selectedHijriInfo.monthStr} {formatNumber(selectedHijriInfo.year, language)} {language === 'ar' ? 'هـ' : 'H'}</p>
                                    </div>
                                    <button onClick={() => setIsFormOpen(!isFormOpen)} className="w-10 h-10 rounded-full bg-gradient-feminine text-white flex items-center justify-center shadow-md hover:scale-110 transition-transform flex-shrink-0"><IconPlus className={`w-5 h-5 transition-transform duration-300 ${isFormOpen ? 'rotate-45' : ''}`} /></button>
                                </div>

                                {isFormOpen && (
                                    <form onSubmit={handleAddEvent} className={`mb-6 p-4 rounded-2xl border ${theme.border} bg-fuchsia-500/5 animate-fade-in`}>
                                        <div className="mb-3"><input type="text" placeholder={tString.titleLabel} required value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-4 py-2 border text-sm font-medium`} /></div>
                                        <div className="flex gap-3 mb-3">
                                            <div className="flex-1"><label className={`block text-[10px] uppercase mb-1 font-bold ${theme.textMuted}`}>{tString.start}</label><input type="time" required value={newEvent.start} onChange={e => setNewEvent({...newEvent, start: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm font-bold`} /></div>
                                            <div className="flex-1"><label className={`block text-[10px] uppercase mb-1 font-bold ${theme.textMuted}`}>{tString.end}</label><input type="time" required value={newEvent.end} onChange={e => setNewEvent({...newEvent, end: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm font-bold`} /></div>
                                        </div>
                                        <div className="mb-4"><textarea placeholder={tString.descPlaceholder} rows="2" value={newEvent.desc} onChange={e => setNewEvent({...newEvent, desc: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-4 py-2 border text-sm resize-none`}></textarea></div>
                                        <button type="submit" className="w-full py-2.5 rounded-xl bg-gradient-feminine text-white text-sm font-bold shadow-md hover:shadow-lg transition-all">{tString.saveAgenda}</button>
                                    </form>
                                )}

                                <div className={`flex-1 overflow-y-auto pb-4 space-y-4 ${language === 'ar' ? 'pl-2' : 'pr-2'}`}>
                                    
                                    {/* QURAN TASK */}
                                    {selectedQuranTask && (
                                        <div className={`p-4 rounded-2xl border relative overflow-hidden group animate-fade-in shadow-sm ${selectedQuranTask.isHaidPause ? (isDayTime ? 'bg-pink-50 border-pink-200' : 'bg-pink-900/30 border-pink-500/50') : (isDayTime ? 'bg-indigo-50 border-indigo-200' : 'bg-indigo-900/30 border-indigo-500/50')}`}>
                                            <div className={`absolute top-0 ${language === 'ar' ? 'right-0' : 'left-0'} bottom-0 w-1.5 ${selectedQuranTask.isHaidPause ? 'bg-pink-500' : 'bg-indigo-500'}`}></div>
                                            <div className={`${language === 'ar' ? 'pr-2' : 'pl-2'}`}>
                                                
                                                {selectedQuranTask.isHaidPause ? (
                                                    <div>
                                                        <div className="inline-block px-2 py-0.5 rounded-md bg-pink-500/20 text-pink-700 dark:text-pink-300 text-[10px] font-bold uppercase tracking-wider mb-2">
                                                            {quranMode === 'tilawah' ? tString.modeTilawah : tString.modeTahfizh.split('(')[0]} - {tString.haidRestMsg}
                                                        </div>
                                                        <h4 className={`font-bold text-sm tracking-tight leading-tight ${isDayTime ? 'text-pink-900' : 'text-pink-100'} flex items-start gap-2`}>
                                                            <IconHeart className="w-5 h-5 text-pink-500 shrink-0" /> {tString.haidRestDesc}
                                                        </h4>
                                                    </div>
                                                ) : (
                                                    <div>
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div>
                                                                <div className="inline-block px-2 py-0.5 rounded-md bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 text-[10px] font-bold uppercase tracking-wider mb-2">
                                                                    {quranMode === 'tilawah' ? tString.modeTilawah : tString.modeTahfizh.split('(')[0]} - {tString.todayTask} {formatNumber(selectedQuranTask.segmentIndex + 1, language)}
                                                                </div>
                                                                <h4 className={`font-bold text-base md:text-lg tracking-tight leading-tight ${isDayTime ? 'text-indigo-900' : 'text-indigo-100'} flex items-center gap-2`} dir={language==='ar' && quranMode!=='tahfizh' ? 'rtl':'ltr'}>
                                                                    <IconBookOpen className="w-5 h-5 text-indigo-500" /> {selectedQuranTask.segmentName}
                                                                </h4>
                                                            </div>
                                                            {selectedQuranTask.isMissed && !selectedQuranTask.isDone && <span className="bg-rose-500 text-white text-[9px] px-2 py-1 rounded-full font-bold uppercase">{tString.missed}</span>}
                                                        </div>
                                                        
                                                        <button onClick={() => toggleQuranTask(selectedDateKey)} className={`mt-3 w-full py-2 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all ${selectedQuranTask.isDone ? 'bg-indigo-500 text-white shadow-md' : 'border-2 border-indigo-400 text-indigo-600 dark:text-indigo-300 hover:bg-indigo-500/10'}`}>
                                                            <IconCheckCircle className="w-4 h-4" /> {selectedQuranTask.isDone ? tString.completed : tString.markDone}
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* SYSTEM EVENTS (ISLAMIC, HEALTH, ROUTINES) */}
                                    {[...selectedIslamicEvents, ...selectedHealthEvents, ...selectedRoutineEvents].map((event, idx) => (
                                        <div key={`sys-${idx}`} className={`p-4 rounded-2xl border ${isDayTime ? getEventColor(event.type) : getDarkEventColor(event.type)} relative overflow-hidden group animate-fade-in shadow-sm`}>
                                            <div className={`absolute top-0 ${language === 'ar' ? 'right-0' : 'left-0'} bottom-0 w-1.5 ${getRibbonColor(event.type)}`}></div>
                                            <div className={`${language === 'ar' ? 'pr-2' : 'pl-2'}`}>
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-2">{getIconForType(event.type)}<h4 className="font-bold text-base md:text-lg tracking-tight leading-tight">{event.title}</h4></div>
                                                        {event.start && event.end && <div className={`flex items-center gap-1.5 text-xs font-mono font-bold mb-2 opacity-80`} dir="ltr"><IconClock className="w-3.5 h-3.5" /> {formatNumber(event.start, language)} - {formatNumber(event.end, language)}</div>}
                                                    </div>
                                                    {event.type === 'routine_kuliah' && (
                                                        <button onClick={() => setEditSessionObj({ id: event.originalId, dateKey: event.dateKey, topic: event.topic || '', link: event.link || '', task: event.task || '' })} className="p-1.5 bg-teal-500/10 hover:bg-teal-500/20 text-teal-600 rounded-lg"><IconEdit className="w-4 h-4" /></button>
                                                    )}
                                                </div>

                                                {(event.desc || event.speaker || event.lecturer) && (
                                                    <div className="inline-block px-2 py-0.5 rounded-md bg-black/5 text-[10px] font-bold uppercase tracking-wider mb-2">
                                                        {event.desc || event.speaker || event.lecturer}
                                                    </div>
                                                )}
                                                
                                                {/* SECTION: TOPIK, LINK, TUGAS RUTINITAS */}
                                                {(event.topic || event.link || event.task) && (
                                                    <div className="space-y-2 mt-2 mb-2">
                                                        {event.topic && <div className="flex items-start gap-2"><IconBriefcase className="w-4 h-4 mt-0.5 opacity-70 shrink-0" /><p className="text-[11px] leading-relaxed opacity-90"><strong className="opacity-100">{tString.topic}:</strong> {event.topic}</p></div>}
                                                        {event.task && <div className="flex items-start gap-2"><IconClipboard className="w-4 h-4 mt-0.5 opacity-70 shrink-0" /><p className="text-[11px] leading-relaxed opacity-90"><strong className="opacity-100">{tString.task}:</strong> {event.task}</p></div>}
                                                        {event.link && <div className="flex items-start gap-2"><IconLink className="w-4 h-4 mt-0.5 opacity-70 shrink-0" /><a href={event.link} target="_blank" rel="noreferrer" className="text-[11px] leading-relaxed opacity-90 underline text-blue-500 break-all">{event.link}</a></div>}
                                                    </div>
                                                )}

                                                {/* SECTION: COLLAPSIBLE DALIL & KEUTAMAAN */}
                                                {(event.dalil || event.keutamaan) && (
                                                    <details className="mt-2 group outline-none cursor-pointer">
                                                        <summary className="text-[10px] font-bold opacity-70 hover:opacity-100 transition-opacity flex items-center gap-1 select-none">
                                                            <IconChevronRight className="w-3 h-3 transition-transform duration-200 group-open:rotate-90" />
                                                            {language === 'ar' ? 'عرض التفاصيل والأدلة' : 'Lihat Detail Dalil & Keutamaan'}
                                                        </summary>

                                                        <p className={`text-xs ${theme.textMuted} mt-1`} dir="ltr"><IconMic className="w-3 h-3 inline mr-1"/>{k.speaker} | <IconClock className="w-3 h-3 inline mr-1"/>{k.start}-{k.end} | {k.recurrence === 'weekly' ? tString.days[k.dayOfWeek] : (k.recurrence==='monthly' ? `Tgl ${k.dateOfMonth}` : 'Sekali')}</p>
                                                    </div>
                                                    <button onClick={() => {const up=kajianSchedules.filter(x=>x.id!==k.id); setKajianSchedules(up); safeSetItem('cal_kajian', up);}} className="text-rose-500 p-2 hover:bg-rose-500/10 rounded"><IconTrash className="w-4 h-4"/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {routineTab === 'kuliah' && (
                                    <div className="space-y-6">
                                        <form onSubmit={handleAddKuliah} className={`p-5 rounded-2xl border ${theme.border} bg-teal-500/5`}>
                                            <h3 className={`font-bold mb-4 ${theme.text}`}>{tString.addRoutine} ({tString.kuliahTab})</h3>
                                            <div className="grid md:grid-cols-2 gap-4 mb-4">
                                                <div><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.subject}</label><input type="text" required value={newKuliah.subject} onChange={e=>setNewKuliah({...newKuliah, subject: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm`} /></div>
                                                <div><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.speaker}</label><input type="text" required value={newKuliah.lecturer} onChange={e=>setNewKuliah({...newKuliah, lecturer: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm`} /></div>
                                                
                                                <div>
                                                    <label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.dayOfWeek}</label>
                                                    <select value={newKuliah.dayOfWeek} onChange={e=>setNewKuliah({...newKuliah, dayOfWeek: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm`}>
                                                        {tString.days.map((d, i) => <option key={i} value={i}>{d}</option>)}
                                                    </select>
                                                </div>
                                                
                                                <div className="flex gap-2">
                                                    <div className="flex-1"><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.start}</label><input type="time" required value={newKuliah.start} onChange={e=>setNewKuliah({...newKuliah, start: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-2 py-2 border text-sm`} /></div>
                                                    <div className="flex-1"><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.end}</label><input type="time" required value={newKuliah.end} onChange={e=>setNewKuliah({...newKuliah, end: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-2 py-2 border text-sm`} /></div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <div className="flex-1"><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>Dari Tgl (Semester)</label><input type="date" required value={newKuliah.startDate} onChange={e=>setNewKuliah({...newKuliah, startDate: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-2 py-2 border text-sm`} /></div>
                                                    <div className="flex-1"><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>Sampai Tgl</label><input type="date" required value={newKuliah.endDate} onChange={e=>setNewKuliah({...newKuliah, endDate: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-2 py-2 border text-sm`} /></div>
                                                </div>
                                            </div>
                                            <button type="submit" className="w-full py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-bold transition-colors">{tString.save}</button>
                                        </form>
                                        
                                        <div className="space-y-3">
                                            {kuliahSchedules.map(k => (
                                                <div key={k.id} className={`p-4 rounded-xl border border-teal-500/30 flex justify-between items-center ${isDayTime ? 'bg-teal-50' : 'bg-teal-900/20'}`}>
                                                    <div>
                                                        <h4 className="font-bold text-teal-600 dark:text-teal-400">{k.subject}</h4>
                                                        <p className={`text-xs ${theme.textMuted} mt-1`} dir="ltr"><IconBriefcase className="w-3 h-3 inline mr-1"/>{k.lecturer} | <IconClock className="w-3 h-3 inline mr-1"/>{k.start}-{k.end} | {tString.days[k.dayOfWeek]}</p>
                                                    </div>
                                                    <button onClick={() => {const up=kuliahSchedules.filter(x=>x.id!==k.id); setKuliahSchedules(up); safeSetItem('cal_kuliah', up);}} className="text-rose-500 p-2 hover:bg-rose-500/10 rounded"><IconTrash className="w-4 h-4"/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MODAL EDIT SESI KULIAH */}
                    {editSessionObj && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in" dir={language === 'ar' ? 'rtl' : 'ltr'}>
                            <form onSubmit={saveSessionEdit} className={`${theme.panel} border border-teal-500/50 w-full max-w-sm rounded-2xl p-6 relative shadow-2xl`}>
                                <button type="button" onClick={() => setEditSessionObj(null)} className={`absolute top-4 ${language === 'ar' ? 'left-4' : 'right-4'} p-1.5 rounded-full hover:bg-rose-500/20 text-rose-500 transition-colors`}><IconX className="w-5 h-5" /></button>
                                <h3 className="font-bold text-teal-600 dark:text-teal-400 mb-5 flex items-center gap-2"><IconEdit className="w-5 h-5"/> {tString.editSession}</h3>
                                
                                <div className="space-y-4">
                                    <div><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.topic}</label><input type="text" value={editSessionObj.topic} onChange={e=>setEditSessionObj({...editSessionObj, topic: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm`} /></div>
                                    <div><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.link}</label><input type="url" placeholder="https://zoom.us/..." value={editSessionObj.link} onChange={e=>setEditSessionObj({...editSessionObj, link: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm`} dir="ltr" /></div>
                                    <div><label className={`block text-xs font-semibold mb-1 ${theme.textMuted}`}>{tString.task}</label><textarea rows="3" value={editSessionObj.task} onChange={e=>setEditSessionObj({...editSessionObj, task: e.target.value})} className={`w-full ${theme.inputBg} rounded-xl px-3 py-2 border text-sm resize-none`}></textarea></div>
                                </div>
                                <button type="submit" className="w-full mt-6 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-bold transition-colors">{tString.save}</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
